<!DOCTYPE html>
 <html lang="en">
   <head>
     <meta charset="utf-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1" />
     <title>Unit Converter</title>
     <link rel="stylesheet" href="src/style.css" />
     <script src="src/script.js"></script>     
     <script src="src/calculator.js"></script>
   </head>
   <body>

    <div class="converter-wrapper">
      <h1>Unit Converter</h1>

      <div style="padding-bottom: 30px;" class="flex-container">
        <div class="converter-side-a">
          <div style="padding-top: 10px;" class="numbersonly"><input id="eV" name="eV" type="text" value="1.0" onkeyup="converter(document,'eV')"/>eV</div>
          <div style="padding-top: 10px;" class="numbersonly"><input id="nm" name="nm" type="text" value="1239.84" onkeyup="converter(document,'nm')"/>nm</div>
          <div style="padding-top: 10px;" class="numbersonly"><input id="cm" name="cm" type="text" value="8065.56" onkeyup="converter(document,'cm')"/>cm-1</div>
          <div style="padding-top: 10px;" class="numbersonly"><input id="fs" name="fs" type="text" value="4.13567" onkeyup="converter(document,'fs')"/>fs</div>
        </div>
        <div class="converter-side-b">
          <div style="padding-top: 10px;" class="numbersonly"><input id="hartree" name="hartree" type="text" value="0.0367492929" onkeyup="converter(document,'hartree')"/>Hartree</div>
          <div style="padding-top: 10px;" class="numbersonly"><input id="um" name="um" type="text" value="1.23984" onkeyup="converter(document,'um')"/>&#181;m</div>
          <div style="padding-top: 10px;" class="numbersonly"><input id="THz" name="THz" type="text" value="241.798" onkeyup="converter(document,'THz')"/>THz</div>
          <div style="padding-top: 10px;" class="numbersonly"><input id="aut" name="aut" type="text" value="170.97" onkeyup="converter(document,'aut')"/>atomic units of time</div>
        </div>
      </div>

      <form name="property_form">
        <span>
          <select class="select-property" 
            name="the_menu" 
            size=1 
            onChange="
              UpdateUnitMenu(this, document.form_A.unit_menu);
              UpdateUnitMenu(this, document.form_B.unit_menu);
              CalculateUnit(document.form_A, document.form_B);
            ">
          </select>
        </span>
      </form>

      <div class="flex-container">

      <div class="converter-side-a">
        <form name="form_A" onSubmit="return false">
          <input type="text" class="numbersonly" name="unit_input" maxlength="20" value="1" onKeyUp="CalculateUnit(document.form_A, document.form_B)">
          <span>
            <select name="unit_menu" onChange="CalculateUnit(document.form_B, document.form_A)">
            </select>
          </span>
        </form>
      </div> <!-- /converter-side-a -->
      
    <div class="converter-equals">
      <p>=</p>
    </div> <!-- /converter-equals -->

      <div class="converter-side-b">
        <form name="form_B" onSubmit="return false">
          <input type="text" class="numbersonly" name="unit_input" maxlength="20" value="1" onkeyup="CalculateUnit(document.form_B, document.form_A)">
          <span>
            <select name="unit_menu" onChange="CalculateUnit(document.form_A, document.form_B)">
            </select>
          </span>
        </form>
      </div> <!-- /converter-side-b -->
    </div><!-- /converter-wrapper -->
    <!--div class = "bottom-explanation">
      <p id="explanation"></p>
    </div-->
   </body>
 </html>
